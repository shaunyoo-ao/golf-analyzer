<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" fill="none">
  <!-- Background -->
  <rect width="200" height="320" fill="#2d4a2d"/>
  <!-- Head -->
  <circle cx="100" cy="48" r="18" fill="#e8e8e8"/>
  <!-- Neck -->
  <rect x="94" y="64" width="12" height="14" rx="4" fill="#e8e8e8"/>
  <!-- Torso -->
  <rect x="74" y="78" width="52" height="68" rx="8" fill="#d0d0d0"/>
  <!-- Left arm -->
  <rect x="58" y="82" width="16" height="60" rx="7" fill="#e8e8e8" transform="rotate(12 58 82)"/>
  <!-- Right arm (reaching down to club) -->
  <rect x="130" y="82" width="16" height="72" rx="7" fill="#e8e8e8" transform="rotate(-12 146 82)"/>
  <!-- Left leg -->
  <rect x="78" y="144" width="20" height="80" rx="8" fill="#222" transform="rotate(3 78 144)"/>
  <!-- Right leg -->
  <rect x="104" y="144" width="20" height="80" rx="8" fill="#222" transform="rotate(-3 124 144)"/>
  <!-- Left foot -->
  <ellipse cx="86" cy="228" rx="18" ry="8" fill="#333"/>
  <!-- Right foot -->
  <ellipse cx="116" cy="228" rx="18" ry="8" fill="#333"/>
  <!-- Club shaft -->
  <line x1="148" y1="130" x2="108" y2="264" stroke="#c8a44a" stroke-width="3" stroke-linecap="round"/>
  <!-- Club head -->
  <ellipse cx="106" cy="266" rx="12" ry="5" fill="#c8a44a" transform="rotate(-10 106 266)"/>
</svg>
