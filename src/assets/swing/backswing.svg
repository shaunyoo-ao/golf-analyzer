<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" fill="none">
  <rect width="200" height="320" fill="#2d4a2d"/>
  <!-- Head (rotated slightly) -->
  <circle cx="96" cy="46" r="18" fill="#e8e8e8"/>
  <!-- Neck -->
  <rect x="90" y="62" width="12" height="14" rx="4" fill="#e8e8e8"/>
  <!-- Torso (rotated) -->
  <rect x="70" y="76" width="52" height="68" rx="8" fill="#d0d0d0" transform="rotate(10 96 110)"/>
  <!-- Left arm (raised, backswing) -->
  <rect x="40" y="58" width="16" height="68" rx="7" fill="#e8e8e8" transform="rotate(-55 48 58)"/>
  <!-- Right arm (near body) -->
  <rect x="130" y="84" width="16" height="52" rx="7" fill="#e8e8e8" transform="rotate(20 138 84)"/>
  <!-- Left leg -->
  <rect x="76" y="142" width="20" height="82" rx="8" fill="#222" transform="rotate(5 76 142)"/>
  <!-- Right leg -->
  <rect x="104" y="142" width="20" height="82" rx="8" fill="#222" transform="rotate(-8 114 142)"/>
  <!-- Left foot -->
  <ellipse cx="84" cy="228" rx="18" ry="8" fill="#333" transform="rotate(5 84 228)"/>
  <!-- Right foot -->
  <ellipse cx="118" cy="230" rx="18" ry="8" fill="#333"/>
  <!-- Club shaft (raised) -->
  <line x1="28" y1="44" x2="100" y2="108" stroke="#c8a44a" stroke-width="3" stroke-linecap="round"/>
  <!-- Club head -->
  <ellipse cx="26" cy="42" rx="12" ry="5" fill="#c8a44a" transform="rotate(45 26 42)"/>
</svg>
